groups:
  - name: basic-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} が停止 ({{ $labels.instance }})"

      - alert: DiskAlmostFull
        expr: 100 * (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "ルートディスク使用率が80%超"

      - alert: HighMemory
        expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "メモリ使用率が90%超"
